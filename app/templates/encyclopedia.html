<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encyclopedia</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">
  <h1 class="text-4xl font-bold mb-8 text-center">Encyclopedia</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

    <script>
      for (let i = 0; i < 8; i++) {
        document.write(`
          <div class="bg-white block max-w-sm border border-gray-200 rounded-xl shadow-sm overflow-hidden">
              <a href="/">
                  <img class="w-full h-56 object-cover" src="${i}.png" alt="Image ${i}" />
              </a>

              <div class="p-6 text-center">
                  <a href="#">
                      <h5 class="mt-3 mb-6 text-2xl font-semibold tracking-tight text-gray-900">
                          Image ${i}
                      </h5>
                  </a>

                  <a href="/"
                     class="inline-flex items-center text-black bg-gray-200 hover:bg-gray-300 
                            font-medium rounded-lg text-sm px-4 py-2.5 transition">
                      See more

                      <svg class="w-4 h-4 ms-1.5 rtl:rotate-180 -me-0.5"
                           aria-hidden="true"
                           xmlns="http://www.w3.org/2000/svg"
                           fill="none"
                           viewBox="0 0 24 24">
                          <path stroke="currentColor"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M19 12H5m14 0-4 4m4-4-4-4"/>
                      </svg>
                  </a>
              </div>
          </div>
        `);
      }
    </script>

  </div>
</body>
</html>
