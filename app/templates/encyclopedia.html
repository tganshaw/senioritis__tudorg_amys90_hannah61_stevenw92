<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encyclopedia</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">
  <h1 class="text-4xl font-bold mb-8 text-center">Encyclopedia</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    <script>
      var data = "{{data}}";
      data = data.split("\n");
      for (let i = 0; i<data.length;i++){
        data[i]=data[i].split(",");
}
      data.pop();

      for (let i = 1; i < data.length; i++) {
        document.write(`
          <div class="bg-white block max-w-sm border border-gray-200 rounded-xl shadow-sm overflow-hidden">
              <a href="/card/${data[i][0]}">
                  <img class="w-full aspect-63/88 object-cover" src="../static/cards/${data[i][0]}.png" alt="Image ${data[i][0]}" />
              </a>

      
          </div>
        `);
      }
    </script>

  </div>
</body>
</html>
