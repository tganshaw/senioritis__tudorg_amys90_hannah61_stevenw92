<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encyclopedia</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">
  <h1 class="text-4xl font-bold mb-8 text-center">Encyclopedia</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

    <script>
      for (let i = 0; i < 8; i++) {
        document.write(`
          <div class="bg-white block max-w-sm border border-gray-200 rounded-xl shadow-sm overflow-hidden">
              <a href="/">
                  <img class="w-full aspect-63/88 object-cover" src="../static/cards/${i}.png" alt="Image ${i}" />
              </a>

      
          </div>
        `);
      }
    </script>

  </div>
</body>
</html>
