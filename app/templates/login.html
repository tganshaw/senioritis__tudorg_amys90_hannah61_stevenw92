<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" type="text/css" href="/static/css/style.css">
</head>

<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#1f2937,_#030712)] text-gray-100">

  <div class="flex items-center justify-center min-h-screen px-4">
    <div class="w-full max-w-md">

      <div class="bg-gray-900 border border-gray-700 shadow-2xl rounded-xl p-8">

        <h1 class="text-2xl font-bold text-center mb-3 text-gray-100">
          Login
        </h1>

        <p class="text-center mb-6 text-gray-400">
          Enter your username and password to access your account
        </p>

        <form method="POST" action="/login">

          {% if error %}
          <div class="bg-red-900 text-red-200 border border-red-700 px-4 py-2 rounded mb-4">
            {{ error }}
          </div>
          {% endif %}

          <div class="mb-4">
            <label for="username" class="block mb-1 font-medium text-gray-200">
              Username
            </label>
            <input
              type="text"
              id="username"
              name="username"
              required
              class="w-full px-3 py-2 bg-gray-800 border border-gray-600 text-gray-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
            >
          </div>

          <div class="mb-4">
            <label for="password" class="block mb-1 font-medium text-gray-200">
              Password
            </label>
            <input
              type="password"
              id="password"
              name="password"
              required
              class="w-full px-3 py-2 bg-gray-800 border border-gray-600 text-gray-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
            >
          </div>

          <div>
            <button
              type="submit"
              class="w-full bg-red-600 text-white font-medium py-2 rounded-lg hover:bg-red-700 transition"
            >
              Login
            </button>
          </div>

        </form>

        <div class="mt-4 text-center">
          <a
            href="/register.html"
            class="inline-block border border-gray-600 text-gray-200 px-4 py-2 rounded-lg hover:bg-gray-800 transition"
          >
            Register
          </a>
        </div>
        <div class="mt-4 text-center">
          <a
            href="/homepage"
            class="inline-block border border-gray-600 text-gray-200 px-4 py-2 rounded-lg hover:bg-gray-800 transition"
          >
            Continue as Guest
          </a>
        </div>

      </div>

    </div>
  </div>

</body>
</html>
