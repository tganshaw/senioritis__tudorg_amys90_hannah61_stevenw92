<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encyclopedia</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">
  <form action="{{url_for('logout')}}" method="POST">
    <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 border border-blue-700 rounded">Logout</button>
  </form>
    <script>
      var data = "{{data}}";
      const id="{{card_id}}"
      data = data.split("\n");
      for (let i = 0; i<data.length;i++){
        data[i]=data[i].split(",");
}
      data.pop();
      
      var values={};
      for (let i =0;i<data[0].length;i++){
        values[data[0][i]]=data[id][i]
}
      console.log(values)  
       document.write(`
          <h1 class="text-4xl font-bold mb-8 text-center">${values["name"]}</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        

                  <img class="w-200 aspect-63/88 object-cover" src="../static/cards/${values["number"]}.png" alt="Image ${values["number"]}" />
</div>





`);   

    </script>

  </div>
</body>
</html>
