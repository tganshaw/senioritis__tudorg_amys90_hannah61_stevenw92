function botRandomAction()
{
    var active_button = document.getElementById("opp-active-button");
    if(active_button)
    {
        var active_card = all_cards[parseInt(active_button.value)];
        
        if(active_card)
        {
            if(active_card["current_hp"] < active_card["max_hp"] / 2)
            {
                const rand_swap = Math.floor((Math.random() * 4) + 5);
                console.log(rand_swap);
                action_list.push(new action(rand_swap, rand_swap, -3, all_cards[rand_swap]["spd"]));
            }
            else
            {
                oppAddAttack();
            }
        }
    }
}

function updateStats()
{
    your_cards_alive = 0;
    opp_cards_alive = 0;
    for(let i = 0; i < 4; i++)
    {
        var this_button = document.getElementById(`${i}-button`);
        var this_hp = document.getElementById(`${i}-hp`);
        if(this_hp && i != parseInt(document.getElementById("active-button").value))
        {
            if(all_cards[this_button.value]["current_hp"] > 0)
            {
                your_cards_alive++;
            }
            this_hp.innerHTML = `${all_cards[this_button.value]["current_hp"]}`;
        }
    }
    for(let i = 5; i < 9; i++)
    {
        var this_button = document.getElementById(`opp-${i}-button`);
        var this_hp = document.getElementById(`opp-${i}-hp`);
        console.log("Card Id: " + i + " | Active Card Id: " + document.getElementById("opp-active-button").value);
        if(this_hp && i != parseInt(document.getElementById("opp-active-button").value))
        {
            if(all_cards[this_button.value]["current_hp"] > 0)
            {
                opp_cards_alive++;
            }
            this_hp.innerHTML = `${all_cards[this_button.value]["current_hp"]}`;
        }
    }
    var active_button = document.getElementById("active-button");
    var active_hp = document.getElementById("active-hp");
    if(active_hp)
    {
        if(all_cards[active_button.value]["current_hp"] > 0)
        {
            your_cards_alive++;
        }

        active_hp.innerHTML = `${all_cards[active_button.value]["current_hp"]}`;
    }
    var opp_active_button = document.getElementById("opp-active-button");
    var opp_active_hp = document.getElementById("opp-active-hp");
    if(opp_active_hp)
    {
        if(all_cards[opp_active_button.value]["current_hp"] > 0)
        {
            opp_cards_alive++;
        }
        opp_active_hp.innerHTML = `${all_cards[opp_active_button.value]["current_hp"]}`;
    }
}

function showStats()
{

}

function setActive()
{
    var active_button = document.getElementById("active-button");
    active_card = parseInt(active_button.value);
    active_button.addEventListener("click", addAttack);
}

function oppAddAttack()
{
    var active_button = document.getElementById("active-button");
    var active_card = all_cards[parseInt(active_button.value)];
    
    var opp_button = document.getElementById("opp-active-button");
    var opp_card = all_cards[parseInt(opp_button.value)];
    
    if(opp_card["atk"] != "-1")
    {
    
        var total_atk = parseInt(opp_card["atk"]) + opp_card["buffs"];
        
        var total_def = parseInt(active_card["def"]) + active_card["buffs"];
        
        var dmg_dealt = total_atk - total_def;
        console.log("Opp Dmg: " + dmg_dealt);
        if(dmg_dealt < 1){dmg_dealt = 1;}
    
        action_list.push(new action(parseInt(opp_button.value), parseInt(active_button.value), dmg_dealt, parseInt(opp_card["spd"])));
    }
    console.log(action_list);
 }

function addAttack()
{
    var active_button = document.getElementById("active-button");
    var active_card = all_cards[parseInt(active_button.value)];
    
    var opp_button = document.getElementById("opp-active-button");
    var opp_card = all_cards[parseInt(opp_button.value)];
    
    if(active_card["atk"] != "-1")
    {
    
        var total_atk = parseInt(active_card["atk"]) + active_card["buffs"];
        
        var total_def = parseInt(opp_card["def"]) + opp_card["buffs"];
        
        var dmg_dealt = total_atk - total_def;
        if(dmg_dealt < 1){dmg_dealt = 1;}
    
        action_list.push(new action(parseInt(active_button.value), parseInt(opp_button.value), dmg_dealt, parseInt(active_card["spd"])));
    }
    console.log(action_list);
 }

function play_actions()
{
    botRandomAction();
    action_list = action_list.sort(sort_by_spd);
    for(let i = 0; i < action_list.length; i++)
    {
        const this_action = action_list[i];
        console.log(this_action);
        const this_user = all_cards[this_action["user"]];
        if(this_user["current_hp"] > 0)
        {
            if(this_action.value == -2)
            {
                if(all_cards[this_action["target"]]["current_hp"] > 0)
                {
                    swap_in(document.getElementById(`${this_action["target"]}-button`));
                }
                setActive();
            }
            if(this_action.value > -1)
            {
                attackCard(this_action["user"], this_action["target"]);
            }
            if(this_action.value == -3)
            {
                if(all_cards[this_action["user"]]["current_hp"] > 0)
                {
                    testOppActive(this_action["user"]);
                }
            }
        } 
    }
    
    while(action_list.length != 0)
    {
        action_list.shift();
    }
   updateStats();
}

function sort_by_spd(a, b)
{
    if(a["speed"] == b["speed"])
    {
      return 0;
    }
    else
      {
        return (a["speed"] > b["speed"]) ? -1 : 1;
      }}

function add_swap_id(button)
{
    const this_button = document.getElementById(`${button}-button`);
    const this_card = all_cards[parseInt(this_button.value)];
    var name = this_button.id;
    var button_val = parseInt(name.substring(0,1));
    action_list.push(new action(parseInt(this_card["game_id"]), button_val, -2, parseInt(this_card["spd"])));
    console.log(action_list);

}     
      
function add_swap(event)
{
    const this_card = all_cards[parseInt(this.value)];
    var name = this.id;
    var button_val = parseInt(name.substring(0,1));
    action_list.push(new action(parseInt(this_card["game_id"]), button_val, -2, parseInt(this_card["spd"])));
    console.log(action_list);
}

function action(user, target, value, speed)
{
    this.user = user;
    this.target = target;
    this.value = value; // Attacks have value, special is -1, swap in is -2
    this.speed = speed;
}

function attackCard(attacker_id, defender_id)
{
    var attacker = all_cards[attacker_id];
    var defender = all_cards[defender_id];
    
    console.log(attacker);
    console.log(defender);
    
    var damage_dealing = parseInt(attacker["atk"]) + parseInt(attacker["buffs"]);
    var defense = parseInt(defender["def"]) + parseInt(defender["buffs"]);
    var final_damage = damage_dealing - defense;
    if(final_damage < 1)
    {
        final_damage = 1;
    }
    
    if(final_damage > -1)
    {
        damageCard(defender_id, final_damage);
    }
    
    //  all_cards[defender_id]["current_hp"] = all_cards[defender_id]["current_hp"] - final_damage;
    
    if(all_cards[defender_id]["current_hp"] <= 0)
    {
        setHP(defender_id, 0);
        return -1;
    }
    updateStats();
}

function setHP(card_id, amt)
{
    all_cards[card_id]["current_hp"] = amt;
}


function damageCard(card_id, damage)
{
    all_cards[card_id]["current_hp"] = all_cards[card_id]["current_hp"] - damage;
    console.log(all_cards[card_id]["current_hp"] + " , " + damage);
    var card_hp = parseInt(all_cards[card_id]["current_hp"]);
    
}

function fillDeck(set)
{
    var cards = [];
    console.log(set.length);
    for(let i = 0; i < set.length; i++)
    {
        var current = data[set[i]];
        console.log(current);
        cards.push(new Card(current["card_id"], current["max_hp"], current["atk"], current["def"], current["spd"], current["max_hp"], 0, 0, numCards ));
        all_cards.push(cards[i]);
        numCards++;
    }
    
    return cards;
}

function Card(card_id, max_hp, atk, def, spd, current_hp, buffs, used_special, game_id)
{
    this.card_id = card_id;
    this.max_hp = max_hp;
    this.atk = atk;
    this.def = def;
    this.spd = spd;
    this.current_hp = current_hp;
    this.buffs = buffs;
    this.used_special = used_special;
    this.game_id = game_id;
}


function shuffle (arr) {
  let i = 0,
      res = [],
      index

  while (i <= arr.length - 1) {
    index = Math.floor(Math.random() * arr.length)

    if (!res.includes(arr[index])) {
      res.push(arr[index])
      i++
    }
  }

  return res
}
